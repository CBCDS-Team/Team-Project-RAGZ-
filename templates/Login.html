<!DOCTYPE html>
<html>
<head>
<title>PurrMetrics Login</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#0b1b3a,#0f2a5c);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
}

.logo{
    font-size:50px;
    margin-bottom:10px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.subtitle{
    font-size:14px;
    opacity:0.7;
    margin-bottom:30px;
}

.card{
    background:#1c3a6b;
    padding:30px;
    border-radius:15px;
    width:320px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#2d4f8a;
    color:white;
}

input::placeholder{
    color:#cfd9ff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#f7c600,#ffd94d);
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.demo{
    margin-top:10px;
    font-size:12px;
    opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">🐱</div>
<div class="title">PurrMetrics</div>
<div class="subtitle">Smart feline health monitoring</div>

<div class="card">

<form method="POST" action="/login">

<input type="text" name="name" placeholder="Your Name">

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Sign In →</button>

</form>

<div class="demo">
Any credentials work for demo
</div>

</div>

</div>

</body>
</html>

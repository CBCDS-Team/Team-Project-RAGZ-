<!DOCTYPE html>
<html>
<head>

<title>PurrMetrics Calendar</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1b2e;
color:white;
}

.layout{
display:flex;
}

.sidebar{
width:220px;
background:#111c34;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#ffd43b;
}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
background:#1b2b4d;
color:white;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#2e4577;
}

.main{
flex:1;
padding:30px;
}

.card{
background:#1a2d52;
padding:20px;
border-radius:15px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-top:20px;
}

.day{
background:#1b2b4d;
padding:15px;
text-align:center;
border-radius:8px;
}

.event{
background:#22c55e;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>PurrMetrics</h2>

<a href="/profile">Profile</a>
<a href="/home">Home</a>
<a href="/dashboard">Analytics</a>
<a href="/sensors">Sensors</a>
<a href="/about">About</a>
<a href="/alerts">Alerts</a>
<a href="/calendar">Calendar</a>
<a href="/detailed-analytics">Detailed Analytics</a>

</div>

<div class="main">

<h1>Behaviour Calendar</h1>

<div class="card">

<div class="calendar">

{% for day in range(1,32) %}

{% if day|string in event_days %}

<div class="day event">{{ day }}</div>

{% else %}

<div class="day">{{ day }}</div>

{% endif %}

{% endfor %}

</div>

<p style="margin-top:20px;">
<span style="color:#22c55e;">● Behaviour detected</span>
</p>

</div>

</div>

</div>

</body>
</html>

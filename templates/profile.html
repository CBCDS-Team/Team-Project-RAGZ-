<!DOCTYPE html>
<html>
<head>

<title>PurrMetrics Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1b2e;
color:white;
}

.layout{
display:flex;
}

.sidebar{
width:220px;
background:#111c34;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#ffd43b;
}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
background:#1b2b4d;
color:white;
text-decoration:none;
border-radius:8px;
}

.main{
flex:1;
padding:30px;
}

.card{
background:#1a2d52;
padding:20px;
border-radius:15px;
max-width:500px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
}

.cat-img{
width:120px;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>PurrMetrics</h2>

<a href="/home">Home</a>
<a href="/dashboard">Analytics</a>
<a href="/calendar">Calendar</a>
<a href="/detailed-analytics">Detailed Analytics</a>
<a href="/alerts">Alerts</a>
<a href="/sensors">Sensors</a>
<a href="/profile">Profile</a>
<a href="/about">About</a>

</div>

<div class="main">

<h1>User Profile</h1>

<div class="card">

<img src="https://placekitten.com/200/200" class="cat-img">

<form method="POST">

<label>Owner Name</label>
<input name="owner_name">

<label>Email</label>
<input name="email">

<label>Cat Name</label>
<input name="cat_name">

<label>Cat Age</label>
<input name="cat_age">

<label>Cat Breed</label>
<input name="cat_breed">

<button type="submit">Save Profile</button>

</form>

</div>

</div>

</div>

</body>
</html>

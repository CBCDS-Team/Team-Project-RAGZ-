<!DOCTYPE html>
<html>
<head>

<title>PurrMetrics Profile</title>

<style>

.main-container{
    display:flex;
    gap:30px;
}

.main{
    flex:2;
    padding:30px;
}

.side-panel{
    flex:1;
    max-width:300px;  /* 👈 ADD THIS LINE */
    background:#1a2d52;
    padding:20px;
    border-radius:15px;
    height:fit-content;
}

.cat-image{
    width:100%;
    max-width:250px;
    display:block;
    margin:0 auto 15px;
}

.side-panel input{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:none;
}

.side-panel button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ffd43b;
    font-weight:bold;
    cursor:pointer;
}

body{
margin:0;
font-family:Arial;
background:#0f1b2e;
color:white;
}

.layout{
display:flex;
}

/* Sidebar */

.sidebar{
width:220px;
background:#111c34;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#ffd43b;
}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
background:#1b2b4d;
color:white;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#2e4577;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Profile Card */

.card{
background:#1a2d52;
padding:25px;
border-radius:15px;
max-width:500px;
}

/* Inputs */

input, select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

/* Text Areas */

textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
resize:vertical;
}

/* Button */

button{
padding:10px 15px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Cat image */

.cat-img{
width:120px;
border-radius:10px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<h2>PurrMetrics</h2>

<a href="/profile">Profile</a>
<a href="/home">Home</a>
<a href="/dashboard">Analytics</a>
<a href="/sensors">Sensors</a>
<a href="/about">About</a>
<a href="/alerts">Alerts</a>
<a href="/calendar">Calendar</a>
<a href="/detailed-analytics">Detailed Analytics</a>
<a href="/logout" style="color:#ff6b6b;">Logout</a>

</div>


<!-- Main Content -->

<div class="main-container">
    <div class="main">

<h1>User & Cat Profile</h1>

<div class="card">

<img src="https://placekitten.com/200/200" class="cat-img">

<form method="POST">

<!-- ALL YOUR INPUTS -->

<button type="submit">Save Profile</button>

</form>

</div> <!-- CLOSE CARD -->

</div> <!-- ✅ CLOSE MAIN HERE -->

<!-- ✅ NOW THIS IS OUTSIDE MAIN -->
<div class="side-panel">

    <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" class="cat-image">

    <h3>Your Cat 🐾</h3>

    <form method="POST" action="/upload-cat" enctype="multipart/form-data">
        <input type="file" name="cat_photo">
        <br><br>
        <button type="submit">Upload Photo</button>
    </form>

</div>

    <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" class="cat-image">

    <h3>Your Cat 🐾</h3>

    <form method="POST" action="/upload-cat" enctype="multipart/form-data">
        <input type="file" name="cat_photo">
        <br><br>
        <button type="submit">Upload Photo</button>
    </form>

</div>

</div> <!-- end main-container -->

</div>

</div>

</div>

</div>

</body>
</html>

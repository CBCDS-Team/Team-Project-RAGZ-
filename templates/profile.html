<!DOCTYPE html>
<html>
<head>

<title>PurrMetrics Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1b2e;
color:white;
}

.layout{
display:flex;
}

/* Sidebar */

.sidebar{
width:220px;
background:#111c34;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#ffd43b;
}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
background:#1b2b4d;
color:white;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#2e4577;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Profile Card */

.card{
background:#1a2d52;
padding:25px;
border-radius:15px;
max-width:500px;
}

/* Inputs */

input, select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

/* Text Areas */

textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
resize:vertical;
}

/* Button */

button{
padding:10px 15px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Cat image */

.cat-img{
width:120px;
border-radius:10px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<h2>PurrMetrics</h2>

<a href="/profile">Profile</a>
<a href="/home">Home</a>
<a href="/dashboard">Analytics</a>
<a href="/sensors">Sensors</a>
<a href="/about">About</a>
<a href="/alerts">Alerts</a>
<a href="/calendar">Calendar</a>
<a href="/detailed-analytics">Detailed Analytics</a>
<a href="/logout" style="color:#ff6b6b;">Logout</a>

</div>


<!-- Main Content -->

<div class="main">

<h1>User & Cat Profile</h1>

<div class="card">

<img src="https://placekitten.com/200/200" class="cat-img">

<form method="POST">

<label>Owner Name</label>
<input type="text" name="owner_name" value="{{ profile.owner_name if profile else '' }}">

<label>Email</label>
<input type="email" name="email" value="{{ session.email }}">


<label>Cat Name</label>
<input type="text" name="cat_name" value="{{ profile.cat_name if profile else '' }}">

<label>Cat Breed</label>
<input type="text" name="cat_breed" value="{{ profile.cat_breed if profile else '' }}">


<label>Cat Date of Birth</label>
<input type="date" name="cat_dob" value="{{ profile.cat_dob if profile else '' }}">

<label>Sex</label>
<select name="cat_sex">
<option value="Male" {% if profile and profile.cat_sex=="Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if profile and profile.cat_sex=="Female" %}selected{% endif %}>Female</option>
</select>

<label>Spayed / Neutered</label>
<select name="cat_neutered">
<option value="Yes" {% if profile and profile.cat_neutered=="Yes" %}selected{% endif %}>Yes</option>
<option value="No" {% if profile and profile.cat_neutered=="No" %}selected{% endif %}>No</option>
</select>


<label>Medical Conditions</label>
<textarea name="medical_conditions" placeholder="e.g. arthritis, kidney disease">{{ profile.medical_conditions if profile else '' }}</textarea>


<label>Allergies</label>
<textarea name="allergies" placeholder="e.g. chicken allergy">{{ profile.allergies if profile else '' }}</textarea>


<label>Medication</label>
<textarea name="medication" placeholder="e.g. insulin, antibiotics">{{ profile.medication if profile else '' }}</textarea>


<button type="submit">Save Profile</button>

</form>

</div>

</div>

</div>

</body>
</html>
